<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
     <h2 align="center">Student Admission Form</h2>

<form>
<table border="solid black" align="center" cellpadding="8">

<tr>
<td><label>Full Name</label></td>
<td><input type="text" placeholder="Enter your full name"></td>
</tr>

<tr>
<td><label>Age</label></td>
<td><input type="number" placeholder="Enter your age"></td>
</tr>

<tr>
<td><label>Gender</label></td>
<td>
<input type="radio" name="gender"> Male
<input type="radio" name="gender"> Female
<input type="radio" name="gender"> Other
</td>
</tr>

<tr>
<td><label>Date of Birth</label></td>
<td><input type="date"></td>
</tr>

<tr>
<td><label>Email</label></td>
<td><input type="email" placeholder="Enter your email"></td>
</tr>

<tr>
<td><label>Contact Number</label></td>
<td><input type="tel" placeholder="Enter phone number"></td>
</tr>

<tr>
<td><label>Address</label></td>
<td><textarea placeholder="Enter your address"></textarea></td>
</tr>

<tr>
<td><label>Course Selection</label></td>
<td>
<select>
<option>Select Course</option>
<option>BCA</option>
<option>BBA</option>
<option>B.Tech</option>
<option>BA</option>
<option>B.Com</option>
</select>
</td>
</tr>

<tr>
<td><label>Previous Qualification</label></td>
<td><input type="text" placeholder="12th Pass / Diploma"></td>
</tr>

<tr>
<td><label>Percentage / Marks</label></td>
<td><input type="number" placeholder="Enter percentage"></td>
</tr>

<tr>
<td><label>Upload Photo</label></td>
<td><input type="file"></td>
</tr>

<tr>
<td colspan="2" align="center">
<input type="submit" value="Submit">
</td>
</tr>

</table>
</form>
</body>
</html>
